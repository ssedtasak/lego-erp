name: Deploy LIFF App to GitHub Pages

# Disabled: LIFF app is now deployed via Vercel (see apps/liff/vercel.json).
# Kept for reference / easy rollback. Trigger manually via workflow_dispatch only.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: apps/liff/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: apps/liff

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_LINE_LIFF_ID: ${{ secrets.VITE_LINE_LIFF_ID }}
        run: npm run build
        working-directory: apps/liff

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: apps/liff/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
